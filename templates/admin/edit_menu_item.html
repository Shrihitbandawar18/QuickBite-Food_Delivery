{% extends "base.html" %}

{% block title %}Edit Menu Item - Admin{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Menu Item</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="restaurant_id" class="form-label">Restaurant</label>
                <select class="form-select" id="restaurant_id" name="restaurant_id" required>
                    {% for restaurant in restaurants %}
                    <option value="{{ restaurant.id }}" {% if restaurant.id == menu_item.restaurant_id %}selected{% endif %}>
                        {{ restaurant.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Item Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ menu_item.name }}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ menu_item.description }}</textarea>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" class="form-control" id="category" name="category" value="{{ menu_item.category }}">
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" step="0.01" min="0" class="form-control" id="price" name="price" value="{{ menu_item.price }}" required>
            </div>
            <div class="mb-3">
                <label for="image_url" class="form-label">Image URL</label>
                <input type="url" class="form-control" id="image_url" name="image_url" value="{{ menu_item.image_url }}">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_featured" name="is_featured" {% if menu_item.is_featured %}checked{% endif %}>
                <label class="form-check-label" for="is_featured">Featured Item</label>
            </div>
            <button type="submit" class="btn btn-primary">Update Menu Item</button>
            <a href="{{ url_for('admin.menu_items') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
