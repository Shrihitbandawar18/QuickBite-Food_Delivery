{% extends "base.html" %}

{% block title %}Add Restaurant - Admin{% endblock %}

{% block content %}
<h1 class="mb-4">Add New Restaurant</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Restaurant Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
                <label for="cuisine" class="form-label">Cuisine Type</label>
                <input type="text" class="form-control" id="cuisine" name="cuisine" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label for="image_url" class="form-label">Image URL</label>
                <input type="url" class="form-control" id="image_url" name="image_url">
            </div>
            <div class="mb-3">
                <label for="rating" class="form-label">Rating</label>
                <input type="number" step="0.1" min="0" max="5" class="form-control" id="rating" name="rating" value="4.0">
            </div>
            <button type="submit" class="btn btn-primary">Add Restaurant</button>
            <a href="{{ url_for('admin.restaurants') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
